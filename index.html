<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3266ad">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="台股追蹤">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>台股自動追蹤系統</title>
<style>
  :root {
    --blue: #3266ad;
    --blue-light: #e6f1fb;
    --green: #1d9e75;
    --green-light: #eaf3de;
    --red: #c33;
    --red-light: #fef0f0;
    --amber: #ba7517;
    --amber-light: #faeeda;
    --gray: #888;
    --bg: #f5f5f3;
    --card: #fff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #eee;
      --text2: #aaa;
      --text3: #777;
      --border: rgba(255,255,255,0.1);
      --blue-light: #1a2635;
      --green-light: #162a22;
      --red-light: #2c1a1a;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
  
  /* Header */
  header { position: sticky; top: 0; background: var(--card); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); z-index: 100; }
  .logo { font-size: 20px; font-weight: 800; color: var(--blue); letter-spacing: -0.5px; }
  .notif-btn { background: var(--blue-light); color: var(--blue); border: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .notif-btn.active { background: var(--blue); color: #fff; }

  /* Main Summary */
  .summary-card { margin: 20px; padding: 24px; background: var(--blue); color: #fff; border-radius: 24px; box-shadow: 0 10px 20px rgba(50,102,173,0.2); }
  .sum-label { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
  .sum-value { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
  .sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sum-item { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 16px; }
  .sum-item-label { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }
  .sum-item-val { font-size: 16px; font-weight: 600; }

  /* Sections */
  .section { display: none; padding: 0 20px; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .sec-title { font-size: 18px; font-weight: 700; margin: 24px 0 16px; display: flex; justify-content: space-between; align-items: center; }

  /* Stock Cards */
  .card { background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 0.5px solid var(--border); }
  .stock-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .stock-info { display: flex; flex-direction: column; }
  .stock-code { font-size: 12px; color: var(--text3); font-weight: 600; }
  .stock-name { font-size: 17px; font-weight: 700; }
  .stock-price-box { text-align: right; }
  .stock-price { font-size: 18px; font-weight: 700; }
  .stock-change { font-size: 12px; font-weight: 600; }
  .stock-change.up { color: var(--red); }
  .stock-change.down { color: var(--green); }
  
  .stock-details { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .det-item { display: flex; flex-direction: column; }
  .det-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .det-val { font-size: 13px; font-weight: 600; }
  .val-up { color: var(--red); }
  .val-down { color: var(--green); }

  .signal-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 700; text-transform: uppercase; margin-left: 6px; }
  .sig-hold { background: var(--blue-light); color: var(--blue); }
  .sig-sell { background: var(--red-light); color: var(--red); }
  .sig-stop { background: var(--amber-light); color: var(--amber); }

  /* Inputs & Forms */
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .input-group input, .input-group select { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .save-btn { width: 100%; background: var(--blue); color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; margin-top: 8px; cursor: pointer; }
  
  /* Management List */
  .mgmt-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .mgmt-info { display: flex; flex-direction: column; }
  .del-btn { background: var(--red-light); color: var(--red); border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }

  /* Nav Bar */
  .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; padding: 8px 12px 24px; border-top: 0.5px solid var(--border); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text3); border: none; background: none; font-size: 11px; font-weight: 500; }
  .nav-btn.active { color: var(--blue); }
  .nav-icon { font-size: 20px; }

  /* Toast */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">STOCK TRACKER</div>
  <button id="notif-btn" class="notif-btn" onclick="requestNotif()">
    <span id="notif-label">🔔 開啟通知</span>
  </button>
</header>

<div id="main-summary" class="summary-card">
  <div class="sum-label">總資產估值 (TWD)</div>
  <div class="sum-value" id="total-assets">--</div>
  <div class="sum-grid">
    <div class="sum-item">
      <div class="sum-item-label">今日損益</div>
      <div class="sum-item-val" id="day-pnl">--</div>
    </div>
    <div class="sum-item">
      <div class="sum-item-label">累計報酬率</div>
      <div class="sum-item-val" id="total-pct">--</div>
    </div>
  </div>
</div>

<div class="section active" id="tab-portfolio">
  <div class="sec-title">我的持倉</div>
  <div id="holdings-list"></div>
</div>

<div class="section" id="tab-alerts">
  <div class="sec-title">價格警報</div>
  <div class="card">
    <div class="stock-row">
      <div class="stock-info">
        <span class="stock-code">3231</span>
        <span class="stock-name">緯創</span>
      </div>
      <div class="stock-price-box">
        <span class="stock-price">$112.5</span>
      </div>
    </div>
    <div class="input-group">
      <label>加碼參考價 (低於觸發)</label>
      <input type="number" id="buy-trigger" value="105">
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>獲利通知</label>
        <input type="number" id="sell-trigger" value="130">
      </div>
      <div class="input-group">
        <label>停損提醒</label>
        <input type="number" id="stop-trigger" value="98">
      </div>
    </div>
    <button class="save-btn" onclick="saveAlerts()">更新警報設定</button>
  </div>
  <button class="save-btn" style="background:var(--bg); color:var(--text); border:1px solid var(--border);" onclick="testNotif()">發送測試通知</button>
</div>

<div class="section" id="tab-watch">
  <div class="sec-title">觀察清單</div>
  <div class="card">
    <div class="stock-row">
      <div class="stock-info">
        <span class="stock-code">2330</span>
        <span class="stock-name">台積電</span>
      </div>
      <div class="stock-price-box">
        <span class="stock-price">$780</span>
        <div class="stock-change up">+1.5%</div>
      </div>
    </div>
  </div>
</div>

<div class="section" id="tab-settings">
  <div class="sec-title">管理持倉數據</div>
  <div class="card">
    <div class="input-group">
      <label>股票/ETF名稱</label>
      <input type="text" id="new-name" placeholder="例如：台積電">
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>代號</label>
        <input type="text" id="new-code" placeholder="2330">
      </div>
      <div class="input-group">
        <label>類型</label>
        <select id="new-type">
          <option value="股票">股票</option>
          <option value="ETF">ETF</option>
        </select>
      </div>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>持股數量 (股)</label>
        <input type="number" id="new-shares" placeholder="1000">
      </div>
      <div class="input-group">
        <label>平均成本</label>
        <input type="number" id="new-cost" placeholder="100.5">
      </div>
    </div>
    <button class="save-btn" onclick="addNewStock()">➕ 新增至持倉</button>
  </div>

  <div class="sec-title">目前持倉列表</div>
  <div class="card" id="mgmt-list">
    </div>
</div>

<nav class="nav-bar">
  <button class="nav-btn active" id="nav-0" onclick="switchTab('portfolio', 0)">
    <span class="nav-icon">📊</span>持倉
  </button>
  <button class="nav-btn" id="nav-1" onclick="switchTab('alerts', 1)">
    <span class="nav-icon">🔔</span>警報
  </button>
  <button class="nav-btn" id="nav-2" onclick="switchTab('watch', 2)">
    <span class="nav-icon">👁️</span>觀察
  </button>
  <button class="nav-btn" id="nav-3" onclick="switchTab('settings', 3)">
    <span class="nav-icon">⚙️</span>管理
  </button>
</nav>

<div id="toast">已更新</div>

<script>
/* 1. 初始化資料處理 */
const DEFAULT_HOLDINGS = [
  { code: '0050', name: '元大台灣50', type: 'ETF', shares: 89, cost: 75.96, pnl: 747, pct: 11.04, signal: 'hold' },
  { code: '009816', name: '凱基台灣TOP50', type: 'ETF', shares: 1008, cost: 10.87, pnl: 1160, pct: 10.56, signal: 'hold' }
];

// 從 LocalStorage 讀取，如果沒有就用預設
let holdings = JSON.parse(localStorage.getItem('user_holdings')) || DEFAULT_HOLDINGS;

function saveHoldingsToStorage() {
  localStorage.setItem('user_holdings', JSON.stringify(holdings));
}

/* 2. 核心渲染功能 */
function renderHoldings() {
  const list = document.getElementById('holdings-list');
  list.innerHTML = '';
  
  holdings.forEach((s, idx) => {
    const totalCost = s.shares * s.cost;
    const currentPrice = s.cost * (1 + (s.pct/100)); // 模擬現價
    const currentVal = s.shares * currentPrice;
    
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="stock-row">
        <div class="stock-info">
          <span class="stock-code">${s.code}.${s.type}</span>
          <span class="stock-name">${s.name} <span class="signal-tag sig-${s.signal}">${s.signal}</span></span>
        </div>
        <div class="stock-price-box">
          <span class="stock-price">$${currentPrice.toFixed(2)}</span>
          <div class="stock-change ${s.pct >=0 ? 'up':'down'}">${s.pct >=0 ? '▲':'▼'} ${Math.abs(s.pct)}%</div>
        </div>
      </div>
      <div class="stock-details">
        <div class="det-item">
          <span class="det-label">市值 / 股數</span>
          <span class="det-val">${Math.round(currentVal).toLocaleString()} / ${s.shares}</span>
        </div>
        <div class="det-item">
          <span class="det-label">成本</span>
          <span class="det-val">$${s.cost}</span>
        </div>
        <div class="det-item">
          <span class="det-label">預估損益</span>
          <span class="det-val ${s.pnl >=0 ? 'val-up':'val-down'}">${s.pnl >=0 ? '+':''}${s.pnl.toLocaleString()}</span>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
  updateHeader();
  renderMgmtList();
}

// 渲染管理分頁的清單
function renderMgmtList() {
  const mgmtList = document.getElementById('mgmt-list');
  if(!mgmtList) return;
  mgmtList.innerHTML = '';
  
  if(holdings.length === 0) {
    mgmtList.innerHTML = '<div style="color:var(--text3); text-align:center; padding:20px;">尚無持倉資料</div>';
    return;
  }

  holdings.forEach((s, idx) => {
    const item = document.createElement('div');
    item.className = 'mgmt-item';
    item.innerHTML = `
      <div class="mgmt-info">
        <span style="font-weight:700;">${s.name} (${s.code})</span>
        <span style="font-size:12px; color:var(--text2);">${s.shares} 股 | 成本 ${s.cost}</span>
      </div>
      <button class="del-btn" onclick="deleteStock(${idx})">刪除</button>
    `;
    mgmtList.appendChild(item);
  });
}

function updateHeader() {
  let totalAsset = 0;
  let totalPnl = 0;
  let totalCost = 0;
  
  holdings.forEach(s => {
    const currentPrice = s.cost * (1 + (s.pct/100));
    totalAsset += (s.shares * currentPrice);
    totalPnl += s.pnl;
    totalCost += (s.shares * s.cost);
  });

  document.getElementById('total-assets').textContent = '$' + Math.round(totalAsset).toLocaleString();
  document.getElementById('day-pnl').textContent = (totalPnl >= 0 ? '+' : '') + Math.round(totalPnl).toLocaleString();
  document.getElementById('day-pnl').className = 'sum-item-val ' + (totalPnl >= 0 ? 'val-up' : 'val-down');
  
  const totalPct = totalCost > 0 ? ((totalPnl / totalCost) * 100).toFixed(2) : 0;
  document.getElementById('total-pct').textContent = totalPct + '%';
}

/* 3. 資料管理功能 */
function addNewStock() {
  const name = document.getElementById('new-name').value;
  const code = document.getElementById('new-code').value;
  const type = document.getElementById('new-type').value;
  const shares = parseFloat(document.getElementById('new-shares').value);
  const cost = parseFloat(document.getElementById('new-cost').value);

  if (!name || !code || isNaN(shares) || isNaN(cost)) {
    alert('請填寫完整資訊');
    return;
  }

  const newStock = {
    code, name, type, shares, cost,
    pnl: 0, 
    pct: 0, 
    signal: 'hold'
  };

  holdings.push(newStock);
  saveHoldingsToStorage();
  renderHoldings();
  
  // 清空欄位
  document.getElementById('new-name').value = '';
  document.getElementById('new-code').value = '';
  document.getElementById('new-shares').value = '';
  document.getElementById('new-cost').value = '';
  
  showToast('已新增股票');
}

function deleteStock(index) {
  if (confirm(`確定要刪除 ${holdings[index].name} 嗎？`)) {
    holdings.splice(index, 1);
    saveHoldingsToStorage();
    renderHoldings();
    showToast('已刪除');
  }
}

/* 4. UI 互動功能 */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(name, idx) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + idx).classList.add('active');
  
  // 如果切換到設定頁面，更新管理列表
  if(name === 'settings') renderMgmtList();
}

function saveAlerts() {
  showToast('警報設定已儲存');
}

/* 5. 通知功能 */
let notifGranted = false;
function requestNotif() {
  Notification.requestPermission().then(permission => {
    if (permission === 'granted') {
      notifGranted = true;
      document.getElementById('notif-label').textContent = '通知已開啟';
      document.getElementById('notif-btn').classList.add('active');
      showToast('通知功能已啟用');
    }
  });
}

function testNotif() {
  if (!notifGranted) {
    requestNotif();
    return;
  }
  new Notification('台股追蹤系統', {
    body: '這是一則測試通知，系統運作正常！',
    icon: 'icons/icon-192.png'
  });
}

// 註冊 Service Worker (PWA核心)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

/* 初始化執行 */
renderHoldings();

</script>

</body>
</html>
