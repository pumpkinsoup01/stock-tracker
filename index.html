<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>台股追蹤 - RapidAPI 修正版</title>
<style>
:root{
  --blue:#2563eb;--green:#16a34a;--red:#dc2626;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#f1f5f9;--text2:#94a3b8;}
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;}
.hdr{background:var(--blue);color:#fff;padding:15px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;}
.btn-upd{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 15px;border-radius:20px;cursor:pointer;font-weight:600;}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:15px;}
.mc{background:var(--card);padding:15px;border-radius:12px;border:1px solid var(--border);}
.ml{font-size:12px;color:var(--text2);margin-bottom:5px;}
.mv{font-size:20px;font-weight:700;}
.card{background:var(--card);margin:0 15px 10px;padding:15px;border-radius:12px;border:1px solid var(--border);}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.stock-item:last-child{border:0;}
.up{color:var(--red);} .dn{color:var(--green);}
.loading-bar{height:3px;background:var(--green);position:fixed;top:0;left:0;width:0%;transition:0.3s;z-index:100;}
.nav{position:fixed;bottom:0;width:100%;background:var(--card);display:flex;border-top:1px solid var(--border);padding:10px 0;}
.nav-btn{flex:1;border:none;background:none;color:var(--text2);font-size:12px;cursor:pointer;}
.nav-btn.active{color:var(--blue);font-weight:700;}
.section{display:none;} .section.active{display:block;}
input, select{width:100%;padding:10px;margin:5px 0 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);}
.btn-save{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;}
</style>
</head>
<body>

<div id="loader" class="loading-bar"></div>
<header class="hdr">
  <div>
    <div style="font-weight:700;">台股即時追蹤</div>
    <div id="status" style="font-size:10px; opacity:0.8;">等待更新...</div>
  </div>
  <button class="btn-upd" onclick="refreshPrices()">🔄 刷新股價</button>
</header>

<div class="summary">
  <div class="mc"><div class="ml">總市值</div><div class="mv" id="total-mv">$0</div></div>
  <div class="mc"><div class="ml">總損益</div><div class="mv" id="total-pnl">--</div></div>
</div>

<div id="sec-portfolio" class="section active">
  <div class="card" id="list-container">
    <div style="text-align:center; color:var(--text2); padding:20px;">正在抓取股價...</div>
  </div>
</div>

<div id="sec-settings" class="section">
  <div class="card">
    <h3 style="margin-bottom:10px;">新增持倉</h3>
    <label>股票代號 (如 2330)</label>
    <input type="text" id="in-code" placeholder="2330">
    <label>持有股數</label>
    <input type="number" id="in-shares" value="1000">
    <label>買入成本</label>
    <input type="number" id="in-cost" value="600">
    <button class="btn-save" onclick="addTrade()">確認加入</button>
  </div>
  
  <div class="card">
    <h3 style="margin-bottom:10px;">API 設定</h3>
    <label>RapidAPI Key</label>
    <input type="password" id="in-key">
    <button class="btn-save" style="background:#64748b;" onclick="saveKey()">儲存金鑰</button>
    <button class="btn-save" style="background:none; color:var(--red); margin-top:10px;" onclick="resetAll()">清除所有資料</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="n-p" onclick="sw('portfolio')">📊 持倉</button>
  <button class="nav-btn" id="n-s" onclick="sw('settings')">⚙️ 設定</button>
</nav>

<script>
// 1. 初始化資料 (如果沒資料，預設放台積電跟0050測試)
const DEFAULT_TRADES = [
  {code:'2330', shares:1000, cost:600, name:'台積電'},
  {code:'0050', shares:1000, cost:150, name:'元大台灣50'}
];

let DB = JSON.parse(localStorage.getItem('stock_tracker_db')) || {
  trades: DEFAULT_TRADES,
  apiKey: '3f74f6e5d8msh13b80ab438e0e49p1edd54jsn72daf4d9c04b',
  prices: {}
};

function save() { localStorage.setItem('stock_tracker_db', JSON.stringify(DB)); }

// 2. 核心：透過 Yahoo Finance API 抓取股價
async function refreshPrices() {
  const ld = document.getElementById('loader');
  const st = document.getElementById('status');
  ld.style.width = '30%';
  st.textContent = '連線中...';

  // 整理代號 (補上 .TW 或 .TWO)
  const symbols = DB.trades.map(t => {
    if (t.code.includes('.')) return t.code;
    return t.code.length <= 4 ? `${t.code}.TW` : `${t.code}.TWO`;
  }).join(',');

  const url = `https://yh-finance.p.rapidapi.com/market/v2/get-quotes?symbols=${symbols}`;
  
  try {
    const response = await fetch(url, {
      method: 'GET',
      headers: {
        'X-RapidAPI-Key': DB.apiKey,
        'X-RapidAPI-Host': 'yh-finance.p.rapidapi.com'
      }
    });

    if (!response.ok) throw new Error('API 回應錯誤: ' + response.status);

    const data = await response.json();
    const results = data.quoteResponse.result;

    if (!results || results.length === 0) {
      st.textContent = '抓不到資料，請檢查代號';
      return;
    }

    // 儲存價格
    results.forEach(item => {
      const pureCode = item.symbol.split('.')[0];
      DB.prices[pureCode] = {
        price: item.regularMarketPrice,
        name: item.shortName || item.longName,
        change: item.regularMarketChangePercent
      };
    });

    ld.style.width = '100%';
    st.textContent = '更新完成: ' + new Date().toLocaleTimeString();
    setTimeout(() => ld.style.width = '0%', 500);
    
    save();
    render();
  } catch (err) {
    console.error(err);
    st.textContent = '錯誤: ' + err.message;
    alert('抓取失敗！請檢查 API Key 是否正確或額度已達上限。');
  }
}

// 3. UI 渲染
function render() {
  const list = document.getElementById('list-container');
  let totalMV = 0;
  let totalCost = 0;

  let html = '';
  DB.trades.forEach(t => {
    const pInfo = DB.prices[t.code] || { price: t.cost, change: 0, name: t.name || '未載入' };
    const mv = pInfo.price * t.shares;
    const pnl = (pInfo.price - t.cost) * t.shares;
    const pnlPct = ((pInfo.price - t.cost) / t.cost * 100).toFixed(2);
    
    totalMV += mv;
    totalCost += (t.cost * t.shares);

    html += `
      <div class="stock-item">
        <div style="flex:1">
          <div style="font-weight:700;">${pInfo.name} <small style="color:var(--text2); font-weight:400;">${t.code}</small></div>
          <div style="font-size:12px; color:var(--text2);">${t.shares}股 | 成本 ${t.cost}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:700;">$${pInfo.price.toLocaleString()}</div>
          <div class="${pnl >= 0 ? 'up' : 'dn'}" style="font-size:12px; font-weight:700;">
            ${pnl >= 0 ? '+' : ''}${Math.round(pnl).toLocaleString()} (${pnlPct}%)
          </div>
        </div>
      </div>
    `;
  });

  list.innerHTML = html || '<div style="text-align:center; padding:20px;">尚無持倉，請至設定新增</div>';
  
  // 更新摘要
  const totalPnl = totalMV - totalCost;
  document.getElementById('total-mv').textContent = '$' + Math.round(totalMV).toLocaleString();
  const pnlEl = document.getElementById('total-pnl');
  pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + Math.round(totalPnl).toLocaleString();
  pnlEl.className = 'mv ' + (totalPnl >= 0 ? 'up' : 'dn');
}

// 4. 功能交互
function addTrade() {
  const code = document.getElementById('in-code').value.trim();
  const shares = parseFloat(document.getElementById('in-shares').value);
  const cost = parseFloat(document.getElementById('in-cost').value);
  
  if(!code || !shares || !cost) return alert('請填寫完整');
  
  DB.trades.push({ code, shares, cost });
  save();
  refreshPrices();
}

function saveKey() {
  DB.apiKey = document.getElementById('in-key').value.trim();
  save();
  alert('金鑰已儲存，嘗試更新...');
  refreshPrices();
}

function sw(sec) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  document.getElementById('n-' + (sec === 'portfolio' ? 'p' : 's')).classList.add('active');
}

function resetAll() {
  if(confirm('確定清除所有自訂資料？')) {
    localStorage.removeItem('stock_tracker_db');
    location.reload();
  }
}

// 啟動
document.getElementById('in-key').value = DB.apiKey;
render();
refreshPrices();
</script>
</body>
</html>
